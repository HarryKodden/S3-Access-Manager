services:
  # OIDC Provider - For testing authentication without external OIDC
  oidc:
    build: oidc-test-provider
    expose:
      - "8888"
    # Use bridge networking so services can reach each other by service name.
    ports:
      - "8888:8888"
    environment:
      - ISSUER=http://localhost:8888
      - CLIENT_ID=test-client
      - CLIENT_SECRET=test-secret
      - ROLES_CLAIM=Groups
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/.well-known/openid-configuration"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Tenant-specific SCIM Servers (for multi-tenant setups)
  # Uncomment and modify for each tenant that needs its own SCIM server
  scim-tenant-a:
    image: harrykodden/scim
    expose:
      - "8001"  # Use different port for each tenant
    # network_mode: host  # removed
    ports:
      - "8001:8001"
    volumes:
      - ./data/scim:/app/data  # Mount tenant-specific data directory
    environment:
      - DATA_PATH=/app/data
      - API_KEY=tenant-a-scim-api-key  # Tenant-specific API key
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # S3 Access Manager - Main application serving frontend and API
  # (Removed) gateway: the Go service is disabled in this compose configuration.

  # Python refactor service (FastAPI)
  py_gateway:
    build: ./py_gateway
    expose:
      - "9000"
    network_mode: host  # Use host networking for direct access to services by localhost
    # ports:
    #   - "9000:9000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./frontend:/app/frontend:ro
      - ./data:/app/data
      - ./py_gateway:/app:rw
    # Override command in compose for development so uvicorn reloads on code changes
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "9000", "--reload", "--reload-dir", "/app"]
    env_file:
      - .env
    environment:
      - TZ=UTC
      - OIDC_ISSUER=http://oidc:8888
      - OIDC_BYPASS=true
      - BYPASS_EMAIL=harry@kodden.nl
      - BYPASS_GROUPS=test-group
    restart: unless-stopped
    depends_on:
      oidc:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
